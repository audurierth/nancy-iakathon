    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        
        .icon-fill {

        }

        body {
            min-height: max(884px, 100dvh);
        }

<body class="bg-slate-100 dark:bg-zinc-900 text-on-surface font-body-md text-body-md antialiased min-h-screen flex flex-col items-center justify-center">
    <div class="w-full max-w-[450px] min-h-screen bg-surface-container-lowest text-on-surface flex flex-col justify-between p-6 shadow-2xl border-x border-ghost-gray dark:border-outline-variant relative">
        <header
            class="fixed top-0 max-w-[450px] w-full left-1/2 -translate-x-1/2 z-50 bg-surface dark:bg-surface-dim border-b border-ghost-gray dark:border-outline-variant flex items-center px-margin-mobile h-16">
            <h1 class="font-headline-sm text-headline-sm font-bold text-navy-blue dark:text-on-primary-fixed-variant truncate" data-i18n="loader.title">
                Simplifia
            </h1>
        </header>
        <div class="w-full flex-grow flex flex-col items-center justify-center pt-[88px] pb-10">
            <!-- Central Icon: Document + Shield Concept -->
            <div class="mb-stack-md flex justify-center items-center">
                <span class="material-symbols-outlined text-navy-blue" style="font-size: 96px; line-height: 1;">
                    policy
                </span>
            </div>
            <p class="font-body-md text-body-md text-on-surface-variant text-center mb-stack-md" data-i18n="loader.subtitle">
                Analyse en cours...
            </p>
            <!-- Vertical Checklist -->
            <div class="flex flex-col gap-stack-sm w-full max-w-sm" id="steps-container">
                <!-- Step 1: Completed -->
                <div id="step-1" class="flex flex-row items-center gap-gutter-mobile p-unit bg-surface-container-low rounded-lg border border-ghost-gray">
                    <span class="step-icon material-symbols-outlined text-navy-blue animate-spin shrink-0" style="font-size: 28px;">
                        progress_activity
                    </span>
                    <span class="step-text font-body-md text-body-md text-navy-blue font-semibold" data-i18n="loader.step1" data-step-key="loader.step1">
                        Extraction du texte
                    </span>
                </div>
                <!-- Step 2: In Progress -->
                <div id="step-2" class="flex flex-row items-center gap-gutter-mobile p-unit opacity-60">
                    <span class="step-icon material-symbols-outlined text-outline-variant shrink-0" style="font-size: 28px;">
                        radio_button_unchecked
                    </span>
                    <span class="step-text font-body-md text-body-md text-on-surface-variant" data-i18n="loader.step2" data-step-key="loader.step2">
                        Anonymisation de vos données (RGPD)
                    </span>
                </div>
                <!-- Step 3: Pending -->
                <div id="step-3" class="flex flex-row items-center gap-gutter-mobile p-unit opacity-60">
                    <span class="step-icon material-symbols-outlined text-outline-variant shrink-0" style="font-size: 28px;">
                        radio_button_unchecked
                    </span>
                    <span class="step-text font-body-md text-body-md text-on-surface-variant" data-i18n="loader.step3" data-step-key="loader.step3">
                        Synthèse par l'IA souveraine
                    </span>
                </div>
            </div>
        </div>
        <!-- Footer -->
        <div class="w-full flex flex-row items-center justify-center gap-unit mt-auto text-on-surface-variant">
            <span class="material-symbols-outlined" style="font-size: 18px;">
                lock
            </span>
            <span class="font-label-md text-label-md" data-i18n="loader.secureConnection">
                Connexion sécurisée
            </span>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const step1 = document.getElementById("step-1");
            const step2 = document.getElementById("step-2");
            const step3 = document.getElementById("step-3");

            function getStepLabel(stepElement) {
                return window.GovAppI18n.t(stepElement.querySelector(".step-text").dataset.stepKey);
            }

            function setCompleted(stepElement) {
                stepElement.className = "flex flex-row items-center gap-gutter-mobile p-unit";
                stepElement.querySelector(".step-icon").className = "step-icon material-symbols-outlined text-[#16a34a] icon-fill shrink-0";
                stepElement.querySelector(".step-icon").textContent = "check_circle";
                stepElement.querySelector(".step-text").className = "step-text font-body-md text-body-md text-on-surface";
                stepElement.querySelector(".step-text").textContent = getStepLabel(stepElement);
            }

            function setInProgress(stepElement) {
                stepElement.className = "flex flex-row items-center gap-gutter-mobile p-unit bg-surface-container-low rounded-lg border border-ghost-gray";
                stepElement.querySelector(".step-icon").className = "step-icon material-symbols-outlined text-navy-blue animate-spin shrink-0";
                stepElement.querySelector(".step-icon").textContent = "progress_activity";
                stepElement.querySelector(".step-text").className = "step-text font-body-md text-body-md text-navy-blue font-semibold";
                stepElement.querySelector(".step-text").textContent = getStepLabel(stepElement);
            }

            // Step 1 is in progress initially.
            // After 1.2 seconds, complete Step 1 and start Step 2
            setTimeout(() => {
                setCompleted(step1);
                setInProgress(step2);
            }, 1200);

            // After 2.4 seconds, complete Step 2 and start Step 3
            setTimeout(() => {
                setCompleted(step2);
                setInProgress(step3);
            }, 2400);

            // After 3.6 seconds, complete Step 3
            setTimeout(() => {
                setCompleted(step3);
            }, 3600);

            // After 4.2 seconds, redirect to secondpage.html
            setTimeout(() => {
                window.location.href = window.GovAppI18n.urlFor("secondpage.html");
            }, 4200);
        });
    </script>
</body>

</html>
