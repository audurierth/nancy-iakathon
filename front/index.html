<!DOCTYPE html>

<html class="light" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title data-i18n="index.browserTitle">Simplifia</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#c6c5d6",
                        "surface-container-high": "#eae7e7",
                        "secondary-fixed-dim": "#ffb4aa",
                        "on-secondary-fixed": "#410001",
                        "primary-container": "#000091",
                        "on-tertiary": "#ffffff",
                        "marianne-red": "#E1000F",
                        "surface-tint": "#4850c6",
                        "primary-fixed": "#e0e0ff",
                        "on-surface-variant": "#454653",
                        "on-tertiary-fixed-variant": "#45464e",
                        "surface": "#fcf9f8",
                        "on-secondary-container": "#fffbff",
                        "on-primary-container": "#7a82fb",
                        "ghost-gray": "#EEEEEE",
                        "tertiary-fixed-dim": "#c5c6ce",
                        "background": "#fcf9f8",
                        "secondary-fixed": "#ffdad5",
                        "on-tertiary-container": "#8d8e96",
                        "outline": "#767685",
                        "error-container": "#ffdad6",
                        "navy-blue": "#000091",
                        "inverse-primary": "#bfc2ff",
                        "on-surface": "#1c1b1b",
                        "inverse-on-surface": "#f3f0ef",
                        "surface-container": "#f0edec",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#bfc2ff",
                        "on-secondary-fixed-variant": "#930006",
                        "reading-surface": "#F6F6F6",
                        "secondary-container": "#e90d14",
                        "tertiary-fixed": "#e1e2eb",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#313030",
                        "on-primary-fixed": "#00006e",
                        "surface-container-highest": "#e5e2e1",
                        "surface-dim": "#dcd9d9",
                        "tertiary": "#101319",
                        "primary": "#000053",
                        "on-tertiary-fixed": "#191b22",
                        "on-background": "#1c1b1b",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f6f3f2",
                        "on-primary-fixed-variant": "#2f36ae",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#fcf9f8",
                        "error": "#ba1a1a",
                        "secondary": "#bc000a",
                        "tertiary-container": "#25272e",
                        "surface-variant": "#e5e2e1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "gutter-mobile": "16px",
                        "margin-mobile": "24px",
                        "stack-lg": "40px",
                        "stack-sm": "12px",
                        "stack-md": "24px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["20px", { "lineHeight": "30px", "fontWeight": "400" }],
                        "label-lg": ["16px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "headline-sm": ["22px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "headline-lg": ["34px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-md": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-md": ["28px", { "lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "18px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        [data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>

<body class="bg-slate-100 dark:bg-zinc-900 text-on-surface font-body-md text-body-md antialiased min-h-screen flex flex-col items-center justify-center">
    <div class="w-full max-w-[450px] min-h-screen bg-surface text-on-surface flex flex-col shadow-2xl border-x border-ghost-gray dark:border-outline-variant relative">
    <!-- TopAppBar -->
    <header
        class="bg-surface dark:bg-surface-dim border-b border-ghost-gray dark:border-outline-variant fixed top-0 max-w-[450px] w-full left-1/2 -translate-x-1/2 z-50 flex items-center justify-between px-margin-mobile h-16">
        <div class="min-w-0 flex-1">
            <h1
                class="font-headline-sm text-headline-sm font-bold text-navy-blue dark:text-on-primary-fixed-variant truncate">
                Simplifia</h1>
        </div>
        <div class="ml-3 flex items-center gap-2">
            <!-- Voice Guidance Toggle -->
            <button aria-label="Guidage Audio Spatialisé"
                class="relative group flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low transition-colors text-outline">
                <span class="material-symbols-outlined" data-icon="headset_mic">headset_mic</span>
                <div class="absolute -top-1 -right-1 w-2 h-2 bg-navy-blue rounded-full hidden" id="voice-indicator">
                </div>
                <!-- Tooltip -->
                <span
                    class="absolute top-12 right-0 bg-navy-blue text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-50"
                    data-i18n="index.voiceGuidance">Guidage Audio Spatialisé</span>
            </button>
            <!-- Language Selector -->
            <div class="relative" data-language-selector>
                <button
                    aria-expanded="false"
                    aria-haspopup="true"
                    class="flex items-center gap-2 px-3 py-1.5 rounded border border-transparent hover:border-outline-variant hover:bg-surface-container-low transition-colors text-navy-blue"
                    data-language-trigger
                    type="button">
                    <span class="material-symbols-outlined text-[20px]" data-icon="language">language</span>
                    <span class="font-label-md text-label-md" data-language-current-label>Français</span>
                    <span class="material-symbols-outlined text-[16px]" data-icon="expand_more">expand_more</span>
                </button>
                <div
                    class="hidden absolute top-full right-0 mt-2 bg-surface border border-ghost-gray shadow-lg rounded-lg py-1 min-w-[180px] z-50"
                    data-language-menu>
                    <button
                        aria-pressed="false"
                        class="w-full flex items-center gap-3 px-4 py-2 hover:bg-surface-container-low text-left font-label-md transition-colors"
                        data-language-option="fr"
                        type="button">
                        <span class="inline-flex h-5 w-5 items-center justify-center rounded-full border border-outline bg-transparent text-[10px] font-semibold uppercase text-on-surface-variant" data-language-badge>FR</span>
                        <span>Français</span>
                        <span class="material-symbols-outlined text-[18px] invisible ml-auto" data-language-check>check</span>
                    </button>
                    <button
                        aria-pressed="false"
                        class="w-full flex items-center gap-3 px-4 py-2 hover:bg-surface-container-low text-left font-label-md transition-colors"
                        data-language-option="en"
                        type="button">
                        <span class="inline-flex h-5 w-5 items-center justify-center rounded-full border border-outline bg-transparent text-[10px] font-semibold uppercase text-on-surface-variant" data-language-badge>EN</span>
                        <span>English</span>
                        <span class="material-symbols-outlined text-[18px] invisible ml-auto" data-language-check>check</span>
                    </button>
                    <button
                        aria-pressed="false"
                        class="w-full flex items-center gap-3 px-4 py-2 hover:bg-surface-container-low text-left font-label-md transition-colors"
                        data-language-option="es"
                        type="button">
                        <span class="inline-flex h-5 w-5 items-center justify-center rounded-full border border-outline bg-transparent text-[10px] font-semibold uppercase text-on-surface-variant" data-language-badge>ES</span>
                        <span>Español</span>
                        <span class="material-symbols-outlined text-[18px] invisible ml-auto" data-language-check>check</span>
                    </button>
                    <button
                        aria-pressed="false"
                        class="w-full flex items-center gap-3 px-4 py-2 hover:bg-surface-container-low text-left font-label-md transition-colors"
                        data-language-option="ar"
                        type="button">
                        <span class="inline-flex h-5 w-5 items-center justify-center rounded-full border border-outline bg-transparent text-[10px] font-semibold uppercase text-on-surface-variant" data-language-badge>AR</span>
                        <span>العربية</span>
                        <span class="material-symbols-outlined text-[18px] invisible ml-auto" data-language-check>check</span>
                    </button>
                </div>
            </div>
        </div>
    </header>
    <main
        class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-[96px] pb-28 w-full text-center">
        <div class="mb-stack-lg flex items-center justify-center mx-auto">
            <img alt="Marianne Logo" class="w-48 h-auto shadow-[0_10px_24px_rgba(0,0,0,0.16)]"
                src="marianne.png" />
        </div>
        <h2
            class="font-headline-lg text-headline-lg mb-stack-lg text-navy-blue dark:text-primary-fixed max-w-[80%] mx-auto">
            Simplifia</h2>
        <p class="font-body-md text-body-md text-on-surface-variant mb-stack-lg max-w-md mx-auto" data-i18n="index.intro">
            Sélectionnez une méthode pour analyser et simplifier votre document officiel.
        </p>
        <div class="flex flex-col gap-stack-sm w-full max-w-md mx-auto">
            <button
                data-primary-action="take-photo"
                class="w-full flex items-center justify-center gap-2 bg-navy-blue hover:bg-primary text-on-primary font-label-lg text-label-lg py-4 px-6 rounded-DEFAULT transition-colors active:scale-95 duration-100 shadow-sm border border-transparent"
                type="button">
                <span class="material-symbols-outlined" data-icon="photo_camera" data-weight="fill">photo_camera</span>
                <span data-i18n="index.takePhoto" data-take-photo-label>Prendre en photo</span>
            </button>
            <button
                data-primary-action="paste-text"
                class="w-full flex items-center justify-center gap-2 bg-surface border-2 border-navy-blue text-navy-blue hover:bg-surface-container-low font-label-lg text-label-lg py-4 px-6 rounded-DEFAULT transition-colors active:scale-95 duration-100 shadow-sm"
                type="button">
                <span class="material-symbols-outlined" data-icon="content_paste">content_paste</span>
                <span data-i18n="index.pasteText">Coller un texte</span>
            </button>
        </div>
        <input accept="image/*" capture="environment" class="hidden" data-image-file-input type="file" />
        <div class="mt-stack-lg flex items-center gap-2 text-on-surface-variant text-label-md font-label-md">
            <span class="material-symbols-outlined text-[18px]" data-icon="shield">shield</span>
            <span data-i18n="index.privacyNote">Anonyme et sans sauvegarde</span>
        </div>
    </main>
    <!-- BottomNavBar -->
    <nav
        class="fixed bottom-0 max-w-[450px] w-full left-1/2 -translate-x-1/2 flex justify-around items-center px-margin-mobile py-2 bg-surface dark:bg-surface-dim border-t border-ghost-gray dark:border-outline-variant z-50 md:hidden">
        <a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-unit py-1 active:scale-95 transition-transform duration-100"
            data-app-link="index.html"
            href="index.html">
            <span class="material-symbols-outlined" data-icon="home" data-weight="fill">home</span>
            <span class="font-label-md text-label-md mt-1" data-i18n="index.navHome">Accueil</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-container-highest rounded-xl px-unit py-1 active:scale-95 transition-transform duration-100"
            data-app-link="loader.html"
            href="loader.html">
            <span class="material-symbols-outlined" data-icon="document_scanner">document_scanner</span>
            <span class="font-label-md text-label-md mt-1" data-i18n="index.navScanners">Scanners</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-container-highest rounded-xl px-unit py-1 active:scale-95 transition-transform duration-100"
            data-app-link="threepage.html"
            href="threepage.html">
            <span class="material-symbols-outlined" data-icon="help">help</span>
            <span class="font-label-md text-label-md mt-1" data-i18n="index.navHelp">Aide</span>
        </a>
    </nav>
    <!-- Footer (Web only for clarity if needed, hidden on mobile to avoid clashing with bottom nav) -->
    <footer
        class="hidden md:flex flex-col gap-stack-sm p-margin-mobile w-full bg-reading-surface dark:bg-inverse-surface border-t border-ghost-gray dark:border-outline-variant items-center mt-auto">
        <div class="flex gap-4">
            <a class="text-on-surface-variant dark:text-surface-variant hover:text-marianne-red dark:hover:text-secondary-fixed-dim font-label-md text-label-md active:opacity-80"
                data-i18n="index.footerLegal" href="#">Mentions légales</a>
            <a class="text-on-surface-variant dark:text-surface-variant hover:text-marianne-red dark:hover:text-secondary-fixed-dim font-label-md text-label-md active:opacity-80"
                data-i18n="index.footerAccessibility" href="#">Accessibilité</a>
            <a class="text-on-surface-variant dark:text-surface-variant hover:text-marianne-red dark:hover:text-secondary-fixed-dim font-label-md text-label-md active:opacity-80"
                data-i18n="index.footerPrivacy" href="#">Données personnelles</a>
        </div>
    </footer>
    </div>
    <script src="i18n.js"></script>
</body>

</html>
