<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1128" />
      <stop offset="50%" stop-color="#101f42" />
      <stop offset="100%" stop-color="#070c1e" />
    </linearGradient>

    <!-- Glowing Cyan/Blue Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0052d4" />
      <stop offset="50%" stop-color="#4364f7" />
      <stop offset="100%" stop-color="#6fb1fc" />
    </linearGradient>

    <!-- French Flag Glowing Gradients -->
    <linearGradient id="blueFlag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002395" />
      <stop offset="100%" stop-color="#001861" />
    </linearGradient>
    <linearGradient id="redFlag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ED2939" />
      <stop offset="100%" stop-color="#B1101E" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Circular Rounded Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Ring Glow -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#neonGrad)" stroke-width="4" opacity="0.4" filter="url(#glow)" />
  <circle cx="256" cy="256" r="220" fill="none" stroke="#00f2fe" stroke-width="1.5" opacity="0.7" />

  <!-- Glowing Geometric Neural Connections in Background -->
  <g opacity="0.25">
    <line x1="256" y1="90" x2="150" y2="200" stroke="#00f2fe" stroke-width="2" />
    <line x1="256" y1="90" x2="362" y2="200" stroke="#00f2fe" stroke-width="2" />
    <line x1="150" y1="200" x2="180" y2="340" stroke="#00f2fe" stroke-width="2" />
    <line x1="362" y1="200" x2="332" y2="340" stroke="#00f2fe" stroke-width="2" />
    <line x1="180" y1="340" x2="256" y2="410" stroke="#00f2fe" stroke-width="2" />
    <line x1="332" y1="340" x2="256" y2="410" stroke="#00f2fe" stroke-width="2" />
    
    <circle cx="256" cy="90" r="6" fill="#00f2fe" />
    <circle cx="150" cy="200" r="6" fill="#00f2fe" />
    <circle cx="362" cy="200" r="6" fill="#00f2fe" />
    <circle cx="180" cy="340" r="6" fill="#00f2fe" />
    <circle cx="332" cy="340" r="6" fill="#00f2fe" />
    <circle cx="256" cy="410" r="6" fill="#00f2fe" />
  </g>

  <!-- Central Shield/AI Logo combining France Flag colors and Neural Hexagon -->
  <g filter="url(#shadow)">
    <!-- French Blue Ribbon Left -->
    <path d="M190,160 L240,160 L240,352 L190,320 Z" fill="url(#blueFlag)" opacity="0.9" />
    
    <!-- French White Ribbon Middle -->
    <path d="M240,160 L272,160 L272,352 L240,352 Z" fill="#ffffff" opacity="0.95" />
    
    <!-- French Red Ribbon Right -->
    <path d="M272,160 L322,160 L322,320 L272,352 Z" fill="url(#redFlag)" opacity="0.9" />
  </g>

  <!-- Neon Tech Overlay (Administrative Marianne/AI Crest) -->
  <g filter="url(#glow)">
    <!-- Outer Octagram/Hexagon representing AI network -->
    <polygon points="256,110 350,190 320,310 256,370 192,310 162,190" fill="none" stroke="#00f2fe" stroke-width="5" />
    
    <!-- Floating Core Core Orb -->
    <circle cx="256" cy="236" r="32" fill="#00f2fe" opacity="0.9" />
    <circle cx="256" cy="236" r="48" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.8" />
    
    <!-- Brain Nodes/AI Connections -->
    <path d="M256,110 L256,160 M256,310 L256,370 M162,190 L210,210 M350,190 L302,210 M192,310 L226,276 M320,310 L286,276" stroke="#00f2fe" stroke-width="3" />
  </g>

  <!-- Sparkles/Stars (European/French Prestige) -->
  <path d="M120,130 L123,137 L130,140 L123,143 L120,150 L117,143 L110,140 L117,137 Z" fill="#ffffff" opacity="0.8" />
  <path d="M390,130 L393,137 L400,140 L393,143 L390,150 L387,143 L380,140 L387,137 Z" fill="#ffffff" opacity="0.8" />
  <path d="M256,50 L258,55 L263,57 L258,59 L256,64 L254,59 L249,57 L254,55 Z" fill="#00f2fe" opacity="0.9" filter="url(#glow)" />
</svg>
